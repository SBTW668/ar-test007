<model-viewer 
    id="transparent-model"
    src="https://pub-bcbcd349a1484a0b8e1d9ae458f21b28.r2.dev/ar-test007.glb" 
    ios-src="https://pub-bcbcd349a1484a0b8e1d9ae458f21b28.r2.dev/ar-test007.usdz"
    crossorigin="anonymous"
    ar 
    camera-controls 
    alt="AR 測試模型 007">
</model-viewer>

<script>
    const modelViewer = document.querySelector("#transparent-model");

    modelViewer.addEventListener("load", () => {
        // 當模型載入後，遍歷所有材質
        const materials = modelViewer.model.materials;
        materials.forEach(material => {
            // 強制設定 Alpha Mode 為 OPAQUE (不透明)
            // 並且不進行 Alpha 混合 (Blend)
            material.setAlphaMode("OPAQUE");
            material.pbrMetallicRoughness.baseColorFactor = [1, 1, 1, 1]; // 強制恢復完全白色不透明基色
        });
        console.log("已強制所有材質為不透明狀態");
    });
</script>
