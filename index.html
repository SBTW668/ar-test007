<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D AR 模型展示</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        /* 讓網頁和模型元件滿版，適合手機觀看 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f5f5f5;
            font-family: sans-serif;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        /* 簡單的標題提示 */
        .info-panel {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(255, 255, 255, 0.85);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            pointer-events: none; /* 讓滑鼠/手指可以穿透點擊模型 */
        }
        .info-panel h1 {
            margin: 0 0 4px 0;
            font-size: 18px;
            color: #333;
        }
        .info-panel p {
            margin: 0;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>AR 互動模型</h1>
        <p>📱 手機點擊右下角按鈕可開啟 AR 鏡頭</p>
    </div>

    <model-viewer 
        src="https://pub-bcbcd349a1484a0b8e1d9ae458f21b28.r2.dev/ar-test007.glb" 
        ios-src="https://pub-bcbcd349a1484a0b8e1d9ae458f21b28.r2.dev/ar-test007.usdz"
        crossorigin="anonymous"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="none"
        shadow-intensity="1"
        alt="AR 測試模型 007">
    </model-viewer>

</body>
</html>
